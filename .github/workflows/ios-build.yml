name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Ensure iOS platform exists
        run: |
          if [ ! -d "ios/App.xcodeproj" ] && [ ! -d "ios/App/App.xcodeproj" ]; then
            rm -rf ios
            npx cap add ios
          else
            echo "iOS platform already exists"
          fi

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Add iOS privacy usage strings
        run: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Help The Hive uses your camera to scan food items in your fridge and pantry so we can generate cheaper meal plans.'" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Help The Hive uses your camera to scan food items in your fridge and pantry so we can generate cheaper meal plans.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Help The Hive uses your photo library to select images of food items for pantry scanning.'" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Help The Hive uses your photo library to select images of food items for pantry scanning.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Help The Hive may save scanned food photos to your library.'" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'Help The Hive may save scanned food photos to your library.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Help The Hive uses your location to find grocery stores near you for better pricing.'" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'Help The Hive uses your location to find grocery stores near you for better pricing.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'Help The Hive uses your location to find grocery stores near you for better pricing.'" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription 'Help The Hive uses your location to find grocery stores near you for better pricing.'" "$PLIST"
          echo "Privacy usage strings added to Info.plist (including NSPhotoLibraryAddUsageDescription)"

      - name: Generate iOS App Icons
        run: |
          python3 -m venv /tmp/iconvenv
          /tmp/iconvenv/bin/pip install Pillow
          /tmp/iconvenv/bin/python scripts/generate-ios-icons.py src/assets/app-icon-flat-1024.png

      - name: Install Apple certificate and provisioning profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p "$PROFILE_DIR"
          security cms -D -i "$PP_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$PROFILE_PLIST")

          cp "$PP_PATH" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"

          echo "PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "APP_IDENTIFIER=$APP_IDENTIFIER" >> "$GITHUB_ENV"

          echo "Installed provisioning profile: $PROFILE_NAME ($PROFILE_UUID)"
          echo "App identifier in profile: $APP_IDENTIFIER"

      - name: Debug provisioning profile
        run: |
          echo "PROFILE_UUID=$PROFILE_UUID"
          echo "PROFILE_NAME=$PROFILE_NAME"
          echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision" > "$RUNNER_TEMP/decoded-profile.plist"
          /usr/libexec/PlistBuddy -c "Print Name" "$RUNNER_TEMP/decoded-profile.plist"
          /usr/libexec/PlistBuddy -c "Print UUID" "$RUNNER_TEMP/decoded-profile.plist"
          /usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" "$RUNNER_TEMP/decoded-profile.plist"
          /usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "$RUNNER_TEMP/decoded-profile.plist"
     
      - name: Configure App target signing in project
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          /usr/bin/python3 - "$PBXPROJ" "$APPLE_TEAM_ID" "$PROFILE_NAME" <<'PY'
          import re, sys
          path, team, profile = sys.argv[1], sys.argv[2], sys.argv[3]
          with open(path, 'r') as f:
              src = f.read()

          # Find buildSettings blocks belonging to the "App" target only
          # Pattern: name = App;\n ... buildSettings = { ... };
          # We modify the XCBuildConfiguration entries that contain PRODUCT_NAME = App
          def patch(block):
              out = block
              # Replace or insert each setting
              settings = {
                  'CODE_SIGN_STYLE': 'Manual',
                  'CODE_SIGN_IDENTITY': '"Apple Distribution"',
                  '"CODE_SIGN_IDENTITY[sdk=iphoneos*]"': '"Apple Distribution"',
                  'DEVELOPMENT_TEAM': team,
                  '"DEVELOPMENT_TEAM[sdk=iphoneos*]"': team,
                  'PROVISIONING_PROFILE_SPECIFIER': f'"{profile}"',
                  '"PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]"': f'"{profile}"',
                  'PRODUCT_BUNDLE_IDENTIFIER': 'com.helpthehive',
                  'MARKETING_VERSION': '1.11',
                  'CURRENT_PROJECT_VERSION': '29',
                  'ASSETCATALOG_COMPILER_APPICON_NAME': 'AppIcon',
              }
              for k, v in settings.items():
                  key_escaped = re.escape(k)
                  pattern = re.compile(rf'{key_escaped}\s*=\s*[^;]+;')
                  replacement = f'{k} = {v};'
                  if pattern.search(out):
                      out = pattern.sub(replacement, out)
                  else:
                      # Insert before closing of buildSettings
                      out = out.replace('};', f'\t\t\t\t{k} = {v};\n\t\t\t}};', 1)
              return out

          # Match each XCBuildConfiguration block that targets the App product
          pattern = re.compile(
              r'(/\* (?:Debug|Release) \*/ = \{\s*isa = XCBuildConfiguration;\s*buildSettings = \{[^}]*PRODUCT_NAME = "?\$\(TARGET_NAME\)"?;[^}]*\};)',
              re.DOTALL,
          )

          # Simpler: match blocks that contain ASSETCATALOG_COMPILER_APPICON_NAME or INFOPLIST_FILE = App/Info.plist
          pattern2 = re.compile(
              r'(\{\s*isa = XCBuildConfiguration;\s*buildSettings = \{)([^}]*INFOPLIST_FILE = App/Info\.plist;[^}]*)(\};\s*name = (?:Debug|Release);)',
              re.DOTALL,
          )

          def repl(m):
              head, body, tail = m.group(1), m.group(2), m.group(3)
              new_body = patch('{' + body + '};').strip()
              # strip outer braces we added
              new_body = new_body[1:-2]
              return head + new_body + tail

          new_src, n = pattern2.subn(repl, src)
          print(f"Patched {n} App target build configurations")
          with open(path, 'w') as f:
              f.write(new_src)
          PY
          echo "--- App target signing settings ---"
          grep -E "CODE_SIGN_STYLE|PROVISIONING_PROFILE_SPECIFIER|DEVELOPMENT_TEAM|PRODUCT_BUNDLE_IDENTIFIER" ios/App/App.xcodeproj/project.pbxproj | sort -u

      - name: Build iOS archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -allowProvisioningUpdates \
            archive \
            CODE_SIGNING_ALLOWED_FOR_PACKAGES=NO

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.helpthehive</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ${{ runner.temp }}/export/*.ipa

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
